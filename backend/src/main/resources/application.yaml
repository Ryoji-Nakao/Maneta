spring:
  application:
    name: maneta
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maneta}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:maneta-super-secret-key-2026-pachimikan}
  expiration: 86400000